/* ── AUDIO ENGINE ──────────────────────────────────────────────────────────
 * Rules that make Web Audio reliable across browsers and iframes:
 * 1. Create AudioContext lazily (never on page load).
 * 2. Always call resume() before scheduling — it returns a Promise.
 * 3. Schedule notes only INSIDE the .then() of that Promise, never before.
 * 4. Add a 50ms safety offset to currentTime so notes don't fire in the past.
 * 5. Pre-warm on first pointerdown so the context is running before any click.
 * ───────────────────────────────────────────────────────────────────────── */
let AC = null;

function getAC() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
  }
  return AC;
}

/* Warm the context on very first touch/click anywhere */
function warmAudio() {
  const ac = getAC();
  ac.resume().catch(() => {});
  document.removeEventListener('pointerdown', warmAudio, true);
  document.removeEventListener('keydown',     warmAudio, true);
}
document.addEventListener('pointerdown', warmAudio, true);
document.addEventListener('keydown',     warmAudio, true);

/* Play a single oscillator note — always called after resume resolves */
function _note(ac, freq, startT, dur, vol, type) {
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  o.connect(g);
  g.connect(ac.destination);
  const t0 = Math.max(startT, ac.currentTime + 0.01);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur - 0.01);
  o.start(t0);
  o.stop(t0 + dur);
}

/* Generic helper: resume then run callback with (ac, baseTime) */
function withAudio(cb) {
  const ac = getAC();
  ac.resume().then(() => {
    cb(ac, ac.currentTime + 0.05);
  }).catch(() => {});
}

/* Board cell click ding */
function playSelect() {
  withAudio((ac, t) => {
    _note(ac, 880,  t,        0.07, 0.30, 'sine');
    _note(ac, 1320, t + 0.06, 0.14, 0.20, 'sine');
  });
}

/* Correct answer chime */
function playCorrect() {
  withAudio((ac, t) => {
    [[523,0],[659,0.14],[784,0.28],[1047,0.44]].forEach(([f, d]) =>
      _note(ac, f, t + d, 0.30, 0.28, 'sine'));
  });
}

/* ── THINK MUSIC ────────────────────────────────────────────────────────────
 * Uses a look-ahead scheduler: every SCHED_MS ms we schedule the next
 * LOOKAHEAD seconds of notes. This is the Web Audio golden pattern for
 * gapless loops. All scheduling happens inside resume().then() so the
 * AudioContext is guaranteed running before we touch currentTime.
 * ───────────────────────────────────────────────────────────────────────── */
const THINK_NOTES = [
  [392,0],[392,2],[392,4],[311,5],[349,6],
  [392,8],[311,10],[392,12],[440,14],[392,16],
  [349,18],[311,20],[261,22],[294,24],[349,26],
  [392,28],[311,30],[392,32],[440,34],[392,36],
  [349,38],[311,40],[294,42],[261,44]
];
const T_BEAT     = 0.28;   /* seconds per beat */
const T_LOOP     = 48 * T_BEAT;  /* full loop duration ~13.4 s */
const T_AHEAD    = 3.5;   /* schedule this far ahead */
const T_INTERVAL = 1200;  /* scheduler tick ms */

let tkTimer   = null;
let tkActive  = false;
let tkNextT   = 0;   /* next AC time we need to schedule from */

function _scheduleTick() {
  if (!tkActive) return;
  const ac = getAC();
  ac.resume().then(() => {
    if (!tkActive) return;
    const horizon = ac.currentTime + T_AHEAD;
    while (tkNextT < horizon) {
      /* Which beat position within the loop does tkNextT correspond to? */
      const loopOffset = tkNextT % T_LOOP;
      /* Schedule all notes whose loop-position falls in [loopOffset, loopOffset+T_AHEAD) */
      THINK_NOTES.forEach(([f, b]) => {
        const beatT = b * T_BEAT;
        /* Find the absolute AC time for this beat in the current or next loop */
        const loopStart = tkNextT - loopOffset;
        let noteT = loopStart + beatT;
        if (noteT < tkNextT) noteT += T_LOOP;
        if (noteT < horizon) {
          _note(ac, f, noteT, T_BEAT * 0.72, 0.20, 'triangle');
        }
      });
      tkNextT += T_AHEAD;
    }
  }).catch(() => {});
}

function startThinkMusic() {
  stopThinkMusic();
  tkActive = true;
  const ac = getAC();
  ac.resume().then(() => {
    if (!tkActive) return;
    tkNextT = ac.currentTime + 0.05;
    _scheduleTick();
    tkTimer = setInterval(_scheduleTick, T_INTERVAL);
  }).catch(() => {});
}

function stopThinkMusic() {
  tkActive = false;
  if (tkTimer) { clearInterval(tkTimer); tkTimer = null; }
}

/* ── STATE ── */
let used = {};
let current = null;

/* ── BOARD ── */
function renderBoard() {
  const board = document.getElementById('board');
  let html = CATS.map(c => `<div class="cat-header">${c}</div>`).join('');
  [200,400,600,800,1000].forEach(pts => {
    CATS.forEach(cat => {
      const key = cat + '|' + pts;
      if (used[key]) {
        html += `<div class="cell used"></div>`;
      } else {
        html += `<div class="cell" data-cat="${escAttr(cat)}" data-pts="${pts}">$${pts}</div>`;
      }
    });
  });
  board.innerHTML = html;

  /* Attach listeners after innerHTML set */
  board.querySelectorAll('.cell:not(.used)').forEach(el => {
    el.addEventListener('click', () => {
      const cat = el.getAttribute('data-cat');
      const pts = parseInt(el.getAttribute('data-pts'), 10);
      openQuestion(cat, pts);
    });
  });
}

function escAttr(s) { return s.replace(/"/g,'&quot;'); }

/* ── MODAL ── */
function openQuestion(cat, pts) {
  const key = cat + '|' + pts;
  if (used[key]) return;
  const q = QS[cat].find(x => x.pts === pts);
  if (!q) return;
  current = { cat, pts, q, key };

  playSelect();

  const modal = document.getElementById('modal');

  showClue();

  document.getElementById('overlay').classList.add('open');
}

function showClue() {
  const { cat, pts, q } = current;
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-cat">${cat}</div>
    <div class="modal-pts">$${pts}</div>
    <div class="modal-clue">${q.clue}</div>
    <div class="music-bar">
      <span>Think music:</span>
      <button class="music-btn" id="think-play-btn">&#9654; Play</button>
      <button class="music-btn" id="think-stop-btn">&#9646;&#9646; Stop</button>
    </div>
    <div id="ans-area">
      <button class="reveal-btn" onclick="showAnswer()">Reveal Answer</button>
    </div>
    <button class="close-btn" onclick="closeModal(false)" style="margin-top:12px;">Close (keep active)</button>
  `;
}

function showAnswer() {
  stopThinkMusic();
  playCorrect();
  const { q } = current;
  document.getElementById('ans-area').innerHTML = `
    <div class="answer-label">Correct Response</div>
    <div class="answer-box">${q.answer}</div>
    <button class="close-btn done" onclick="closeModal(true)">Done — mark used ✓</button>
  `;
}

function closeModal(markUsed) {
  stopThinkMusic();
  if (markUsed && current) {
    used[current.key] = true;
    renderBoard();
  }
  document.getElementById('overlay').classList.remove('open');
  current = null;
}

function resetBoard() {
  if (!confirm('Reset the entire board?')) return;
  used = {};
  renderBoard();
}

/* Delegate clicks inside modal for dynamic buttons */
document.getElementById('modal').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  const id = btn.id;
  if (id === 'think-play-btn')  { startThinkMusic(); return; }
  if (id === 'think-stop-btn')  { stopThinkMusic();  return; }
});

/* Close on overlay background click */
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal(false);
});

const FJ = {

function renderFJ() {
  const m = document.getElementById('fj-modal');
  if (fjState === 'category') {
    m.innerHTML = `
      <div style="text-align:center;padding:12px 0 24px;">
        <div style="font-size:11px;color:#6a83a4;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;">Final Jeopardy</div>
        <div style="width:60px;height:2px;background:#e8d87a;margin:0 auto 24px;"></div>
        <div style="font-size:13px;color:#8fa3c4;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Category</div>
        <div style="font-size:26px;font-weight:800;color:#e8d87a;font-style:italic;line-height:1.3;margin-bottom:28px;">${FJ.category}</div>
        <div style="font-size:13px;color:#6a83a4;margin-bottom:28px;line-height:1.6;">Write down your wager now.<br>The clue will be revealed when everyone is ready.</div>
        <button class="reveal-btn" onclick="fjShowClue()">Show the Clue</button>
      </div>`;
  } else if (fjState === 'clue') {
    m.innerHTML = `
      <div style="font-size:10px;color:#6a83a4;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">Final Jeopardy</div>
      <div style="font-size:11px;color:#e8d87a;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px;">${FJ.category}</div>
      <div class="modal-clue" style="font-size:19px;line-height:1.7;">${FJ.clue}</div>
      <div class="music-bar">
        <span>Think music:</span>
        <button class="music-btn" id="think-play-btn">&#9654; Play</button>
        <button class="music-btn" id="think-stop-btn">&#9646;&#9646; Stop</button>
      </div>
      <button class="reveal-btn" onclick="fjShowAnswer()">Reveal Answer</button>
      <button class="close-btn" onclick="closeFJ()" style="margin-top:10px;">Close</button>`;
  } else if (fjState === 'answer') {
    m.innerHTML = `
      <div style="font-size:10px;color:#6a83a4;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">Final Jeopardy</div>
      <div style="font-size:11px;color:#e8d87a;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px;">${FJ.category}</div>
      <div class="modal-clue" style="font-size:19px;line-height:1.7;margin-bottom:20px;">${FJ.clue}</div>
      <div class="answer-label">Correct Response</div>
      <div class="answer-box" style="font-size:20px;font-weight:700;">${FJ.answer}</div>
      <button class="close-btn done" onclick="closeFJ()" style="margin-top:6px;">Done</button>`;
  }
}

function fjShowClue() {
  fjState = 'clue';
  renderFJ();
  startThinkMusic();
}

function fjShowAnswer() {
  stopThinkMusic();
  playCorrect();
  fjState = 'answer';
  renderFJ();
}

function closeFJ() {
  stopThinkMusic();
  fjState = 'idle';
  document.getElementById('fj-overlay').classList.remove('open');
}

/* Delegate think music buttons inside fj-modal too */
document.getElementById('fj-modal').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  if (btn.id === 'think-play-btn')  startThinkMusic();
  if (btn.id === 'think-stop-btn')  stopThinkMusic();
});

document.getElementById('fj-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeFJ();
});

/* Init */
renderBoard();
</script>
</body>
</html>
